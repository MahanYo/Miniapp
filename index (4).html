<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اونلی فا | 𝐎𝐧𝐞𝐥𝐢𝐅𝐀</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* ===== CSS Variables for Themes ===== */
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: #1a1a2e;
            --bg-input: #0a0a1a;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #666;
            --border-color: #1f1f3a;
            --accent: #f7971e;
            --accent-gradient: linear-gradient(135deg, #f7971e, #ffd200);
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-full: 30px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f0f0f0;
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --text-muted: #888;
            --border-color: #e0e0e0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        /* ===== Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            transition: var(--transition);
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0 12px 80px;
            position: relative;
            background: var(--bg-primary);
            transition: var(--transition);
        }

        /* ===== Header ===== */
        .header {
            padding: 12px 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--border-color);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .app-title {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-title i {
            color: var(--accent);
            font-size: 22px;
        }

        .app-title span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 0.5px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .header-btn:active {
            transform: scale(0.9);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
        }

        .user-avatar.admin {
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        /* ===== Search ===== */
        .search-bar {
            padding: 8px 0;
            flex-shrink: 0;
        }

        .search-input-wrap {
            display: flex;
            align-items: center;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 0 14px;
            border: 0.5px solid var(--border-color);
            transition: var(--transition);
        }

        .search-input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(247, 151, 30, 0.08);
        }

        .search-input-wrap i {
            color: var(--text-muted);
            font-size: 16px;
            margin-left: 10px;
        }

        .search-input {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* ===== Stories (Instagram-like) ===== */
        .stories-container {
            display: flex;
            gap: 10px;
            padding: 8px 0 12px;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }

        .stories-container::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .story-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            padding: 2px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-avatar .inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-primary);
            overflow: hidden;
        }

        .story-avatar .inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .story-name {
            font-size: 10px;
            color: var(--text-secondary);
            max-width: 56px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        /* ===== Category Tabs ===== */
        .category-tabs {
            display: flex;
            gap: 6px;
            padding: 4px 0 12px;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 6px 16px;
            border-radius: var(--radius-full);
            border: 0.5px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .category-tab i {
            font-size: 14px;
        }

        .category-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(247, 151, 30, 0.2);
        }

        .category-tab:active {
            transform: scale(0.95);
        }

        /* ===== Content Scroll ===== */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .content-scroll::-webkit-scrollbar {
            display: none;
        }

        /* ===== Tab Content ===== */
        .tab-content {
            display: none;
            animation: fadeSlide 0.3s ease forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Section Title ===== */
        .section-title {
            padding: 6px 0 10px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title .see-all {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== Post Card ===== */
        .post-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 14px;
            border: 0.5px solid var(--border-color);
            transition: var(--transition);
            animation: fadeUp 0.35s ease forwards;
            opacity: 0;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .post-card:active {
            transform: scale(0.98);
        }

        .post-image {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-secondary);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .post-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-image .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: var(--text-muted);
            font-size: 36px;
        }

        .post-body {
            padding: 12px 14px 14px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .post-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .post-title i {
            color: var(--accent);
            font-size: 16px;
        }

        .post-date {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 2px 10px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            margin-right: 6px;
        }

        .post-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 0.5px solid var(--border-color);
        }

        .post-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--accent);
            color: #fff;
            padding: 6px 16px;
            border-radius: var(--radius-full);
            text-decoration: none;
            font-weight: 600;
            font-size: 12px;
            transition: var(--transition);
        }

        .post-link i {
            font-size: 14px;
        }

        .post-link:active {
            transform: scale(0.95);
        }

        .post-stats {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .post-stats .stat {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            padding: 4px;
            border-radius: 8px;
        }

        .post-stats .stat:active {
            transform: scale(0.9);
        }

        .post-stats .stat i {
            font-size: 15px;
        }

        .post-stats .stat.liked i {
            color: #ff4757;
        }

        .post-stats .stat .num {
            font-weight: 600;
        }

        /* ===== Comments ===== */
        .comments-section {
            padding: 0 14px 14px;
            display: none;
        }

        .comments-section.open {
            display: block;
        }

        .comment-item {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 0.5px solid var(--border-color);
        }

        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .comment-body {
            flex: 1;
            min-width: 0;
        }

        .comment-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .comment-text {
            font-size: 12px;
            color: var(--text-secondary);
            word-wrap: break-word;
            margin-top: 1px;
        }

        .comment-input-wrap {
            display: flex;
            gap: 6px;
            padding-top: 8px;
        }

        .comment-input {
            flex: 1;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 0.5px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            -webkit-user-select: text;
            user-select: text;
            transition: var(--transition);
        }

        .comment-input:focus {
            border-color: var(--accent);
        }

        .comment-input::placeholder {
            color: var(--text-muted);
        }

        .comment-send {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .comment-send:active {
            transform: scale(0.9);
        }

        /* ===== Chat ===== */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0 10px;
            border-bottom: 0.5px solid var(--border-color);
        }

        .chat-header-title {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-header-title i {
            color: var(--accent);
        }

        .chat-header-info {
            font-size: 11px;
            color: var(--text-muted);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scrollbar-width: none;
        }

        .chat-messages::-webkit-scrollbar {
            display: none;
        }

        .chat-msg {
            max-width: 82%;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            transition: var(--transition);
        }

        .chat-msg.self {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .chat-msg.other {
            background: var(--bg-secondary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }

        .chat-msg .sender {
            font-size: 10px;
            font-weight: 600;
            opacity: 0.7;
            margin-bottom: 1px;
        }

        .chat-msg .text {
            word-wrap: break-word;
        }

        .chat-msg .time {
            font-size: 9px;
            opacity: 0.4;
            margin-top: 3px;
            display: block;
            text-align: left;
        }

        .chat-msg .reply {
            font-size: 11px;
            opacity: 0.6;
            padding: 2px 8px;
            border-right: 2px solid var(--accent);
            margin-bottom: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }

        .chat-msg .actions {
            display: none;
            position: absolute;
            top: -8px;
            right: -8px;
            gap: 2px;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 2px;
            border: 0.5px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .chat-msg:hover .actions {
            display: flex;
        }

        .chat-msg .actions button {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            padding: 4px 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: var(--transition);
        }

        .chat-msg .actions button:active {
            background: var(--border-color);
            transform: scale(0.9);
        }

        .chat-msg .actions .delete-btn {
            color: #ff4757;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            border-top: 0.5px solid var(--border-color);
            flex-shrink: 0;
            background: var(--bg-primary);
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 0.5px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            -webkit-user-select: text;
            user-select: text;
            transition: var(--transition);
        }

        .chat-input-area input:focus {
            border-color: var(--accent);
        }

        .chat-input-area input::placeholder {
            color: var(--text-muted);
        }

        .chat-input-area button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-input-area button:active {
            transform: scale(0.9);
        }

        /* ===== Admin Panel ===== */
        .admin-panel {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.02);
        }

        .admin-panel.hidden {
            display: none;
        }

        .admin-panel .panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 0.5px solid var(--border-color);
        }

        .admin-panel .panel-header i {
            font-size: 20px;
            color: #ffd700;
        }

        .admin-panel .panel-header h3 {
            font-size: 15px;
            font-weight: 700;
            color: #ffd700;
        }

        .admin-panel .panel-header .badge {
            font-size: 9px;
            background: rgba(255, 215, 0, 0.12);
            color: #ffd700;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-weight: 600;
        }

        .admin-panel .stats-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .admin-panel .stat-box {
            flex: 1;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            padding: 10px;
            text-align: center;
        }

        .admin-panel .stat-box .number {
            font-size: 18px;
            font-weight: 800;
            color: #ffd700;
        }

        .admin-panel .stat-box .label {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .admin-input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
            border: 0.5px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: var(--transition);
            -webkit-user-select: text;
            user-select: text;
        }

        .admin-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.06);
        }

        .admin-input::placeholder {
            color: var(--text-muted);
        }

        .admin-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: #ffd700;
            color: #0a0a1a;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .admin-btn i {
            font-size: 16px;
        }

        .admin-btn:active {
            transform: scale(0.97);
        }

        .admin-btn.secondary {
            background: var(--border-color);
            color: var(--text-primary);
            margin-top: 6px;
        }

        .admin-status {
            margin-top: 8px;
            font-size: 12px;
            text-align: center;
            color: var(--text-muted);
        }

        .admin-status.success {
            color: #4caf50;
        }
        .admin-status.error {
            color: #ff4757;
        }

        .hidden {
            display: none !important;
        }

        /* ===== Upload ===== */
        .upload-wrap {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .upload-btn {
            padding: 10px 16px;
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }

        .upload-btn:active {
            transform: scale(0.95);
            background: var(--bg-secondary);
        }

        .upload-btn i {
            font-size: 18px;
        }

        .upload-preview {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 0.5px solid var(--border-color);
            flex-shrink: 0;
            display: none;
            position: relative;
        }

        .upload-preview.show {
            display: block;
        }

        .upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-preview .remove {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff4757;
            color: #fff;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ===== Admin Controls ===== */
        .post-admin-controls {
            display: flex;
            gap: 6px;
            padding: 0 14px 14px;
        }

        .post-admin-controls button {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .post-admin-controls button i {
            font-size: 13px;
        }

        .post-admin-controls button:active {
            transform: scale(0.95);
        }

        .btn-edit {
            background: rgba(255, 215, 0, 0.12);
            color: #ffd700;
        }

        .btn-delete {
            background: rgba(255, 71, 87, 0.12);
            color: #ff4757;
        }

        /* ===== Loading ===== */
        .loading {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
        }

        .loading i {
            font-size: 28px;
            display: block;
            margin-bottom: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Dock ===== */
        .dock {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 4px 8px;
            border-radius: var(--radius-full);
            display: flex;
            gap: 2px;
            border: 0.5px solid var(--border-color);
            box-shadow: var(--shadow);
            z-index: 50;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .dock-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .dock-btn i {
            font-size: 20px;
        }

        .dock-btn.active {
            color: #fff;
            background: var(--accent);
            box-shadow: 0 4px 15px rgba(247, 151, 30, 0.25);
        }

        .dock-btn:active {
            transform: scale(0.9);
        }

        .dock-btn .badge-dot {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 7px;
            height: 7px;
            background: #ff4757;
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        /* ===== Settings Modal ===== */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .settings-overlay.show {
            display: flex;
        }

        .settings-modal {
            background: var(--bg-secondary);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .settings-modal .handle {
            width: 40px;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .settings-modal h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 0.5px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
        }

        .settings-item:active {
            opacity: 0.6;
        }

        .settings-item .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .settings-item .left i {
            font-size: 20px;
            color: var(--accent);
        }

        .settings-item .right {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 420px) {
            .app-container {
                padding: 0 10px 70px;
            }
            .dock-btn {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
            .dock-btn i {
                font-size: 18px;
            }
            .story-avatar {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="app-title">
                <i class="ph-fill ph-film-strip"></i>
                <span>اونلی فا | 𝐎𝐧𝐞𝐥𝐢𝐅𝐀</span>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="themeToggle">
                    <i class="ph ph-moon"></i>
                </button>
                <button class="header-btn" id="settingsToggle">
                    <i class="ph ph-gear"></i>
                </button>
                <div class="user-avatar" id="userAvatar">👤</div>
            </div>
        </header>

        <!-- ===== SEARCH ===== -->
        <div class="search-bar">
            <div class="search-input-wrap">
                <i class="ph ph-magnifying-glass"></i>
                <input class="search-input" id="searchInput" type="text" placeholder="جستجو...">
                <i class="ph ph-x" id="searchClear" style="cursor:pointer;display:none;font-size:16px;"></i>
            </div>
        </div>

        <!-- ===== STORIES ===== -->
        <div class="stories-container" id="storiesContainer">
            <!-- Generated by JS -->
        </div>

        <!-- ===== CATEGORIES ===== -->
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-cat="all"><i class="ph ph-grid-four"></i> همه</button>
            <button class="category-tab" data-cat="action"><i class="ph ph-lightning"></i> اکشن</button>
            <button class="category-tab" data-cat="drama"><i class="ph ph-mask-happy"></i> درام</button>
            <button class="category-tab" data-cat="comedy"><i class="ph ph-smiley"></i> کمدی</button>
            <button class="category-tab" data-cat="sci-fi"><i class="ph ph-planet"></i> علمی</button>
        </div>

        <!-- ===== CONTENT ===== -->
        <div class="content-scroll" id="contentScroll">

            <!-- ===== TAB 1: Explore ===== -->
            <div class="tab-content active" id="tab-explore">
                <div id="adminPanel" class="admin-panel hidden">
                    <div class="panel-header">
                        <i class="ph-fill ph-gear"></i>
                        <h3>پنل مدیریت</h3>
                        <span class="badge">ادمین</span>
                    </div>
                    <div class="stats-row">
                        <div class="stat-box"><div class="number" id="statPosts">0</div><div class="label">پست</div></div>
                        <div class="stat-box"><div class="number" id="statLikes">0</div><div class="label">لایک</div></div>
                        <div class="stat-box"><div class="number" id="statComments">0</div><div class="label">کامنت</div></div>
                    </div>
                    <div class="upload-wrap">
                        <button class="upload-btn" id="uploadBtn"><i class="ph ph-image"></i> انتخاب عکس</button>
                        <div class="upload-preview" id="uploadPreview"><img id="previewImg" src=""><button class="remove" id="removeImg">✕</button></div>
                    </div>
                    <input class="admin-input" id="postImage" placeholder="🔗 یا لینک عکس" style="display:none;">
                    <input class="admin-input" id="postTitle" placeholder="📌 عنوان فیلم">
                    <input class="admin-input" id="postCategory" placeholder="🏷 ژانر">
                    <textarea class="admin-input" id="postDesc" rows="2" placeholder="✍ توضیحات"></textarea>
                    <input class="admin-input" id="postLink" placeholder="🔗 لینک دانلود">
                    <button class="admin-btn" id="publishBtn"><i class="ph ph-plus-circle"></i> انتشار</button>
                    <button class="admin-btn secondary hidden" id="updateBtn"><i class="ph ph-arrows-clockwise"></i> بروزرسانی</button>
                    <div id="adminStatus" class="admin-status"></div>
                </div>

                <div id="postsContainer">
                    <div class="loading"><i class="ph-fill ph-spinner"></i> در حال بارگذاری...</div>
                </div>
            </div>

            <!-- ===== TAB 2: Chat ===== -->
            <div class="tab-content" id="tab-chat">
                <div class="chat-container">
                    <div class="chat-header">
                        <div class="chat-header-title"><i class="ph-fill ph-chat-dots"></i> چت عمومی</div>
                        <div class="chat-header-info" id="chatUsers">۰ پیام</div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                    <div class="chat-input-area">
                        <input id="chatInput" placeholder="پیام...">
                        <button id="chatSendBtn"><i class="ph-fill ph-paper-plane-right"></i></button>
                    </div>
                </div>
            </div>

            <!-- ===== TAB 3: Profile ===== -->
            <div class="tab-content" id="tab-profile">
                <div style="text-align:center;padding:30px 0;">
                    <div style="width:80px;height:80px;border-radius:50%;background:var(--accent-gradient);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;" id="profileAvatar">👤</div>
                    <h2 style="font-size:18px;" id="profileName">کاربر</h2>
                    <p style="color:var(--text-muted);font-size:13px;" id="profileId">@unknown</p>
                    <div style="display:flex;justify-content:center;gap:24px;margin:16px 0;">
                        <div><div style="font-size:20px;font-weight:700;" id="profilePosts">0</div><div style="font-size:11px;color:var(--text-muted);">پست</div></div>
                        <div><div style="font-size:20px;font-weight:700;" id="profileLikes">0</div><div style="font-size:11px;color:var(--text-muted);">لایک</div></div>
                    </div>
                    <button class="admin-btn" style="max-width:200px;margin:0 auto;" id="supportBtn"><i class="ph ph-headset"></i> پشتیبانی</button>
                </div>
            </div>

        </div>

        <!-- ===== DOCK ===== -->
        <div class="dock">
            <button class="dock-btn active" data-tab="explore"><i class="ph-fill ph-compass"></i></button>
            <button class="dock-btn" data-tab="chat"><i class="ph-fill ph-chat-dots"></i></button>
            <button class="dock-btn" data-tab="profile"><i class="ph-fill ph-user"></i><span class="badge-dot"></span></button>
        </div>

        <!-- ===== SETTINGS MODAL ===== -->
        <div class="settings-overlay" id="settingsModal">
            <div class="settings-modal">
                <div class="handle"></div>
                <h3><i class="ph-fill ph-gear" style="color:var(--accent);"></i> تنظیمات</h3>
                <div class="settings-item" id="themeSetting">
                    <div class="left"><i class="ph ph-moon"></i> <span>تم تاریک/روشن</span></div>
                    <div class="right" id="themeStatus">روشن</div>
                </div>
                <div class="settings-item" id="langSetting">
                    <div class="left"><i class="ph ph-translate"></i> <span>زبان</span></div>
                    <div class="right">فارسی</div>
                </div>
                <div class="settings-item" id="supportSetting">
                    <div class="left"><i class="ph ph-headset"></i> <span>پشتیبانی</span></div>
                    <div class="right"><i class="ph ph-caret-left"></i></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        //  تنظیمات
        // ============================================================
        const API_URL = 'https://kos6rrrr.pythonanywhere.com/api';
        const ADMIN_ID = 8492696944;
        let allPosts = [];
        let editingPostId = null;
        let currentCategory = 'all';
        let currentUser = null;
        let replyTo = null;

        // ============================================================
        //  راه‌اندازی
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const user = tg.initDataUnsafe?.user;
            currentUser = user;

            // Avatar
            const avatar = document.getElementById('userAvatar');
            if (user) {
                const name = user.first_name || 'کاربر';
                avatar.textContent = name.charAt(0).toUpperCase();
                if (user.id === ADMIN_ID) {
                    avatar.classList.add('admin');
                    document.getElementById('adminPanel').classList.remove('hidden');
                }
            }

            // Profile
            if (user) {
                document.getElementById('profileAvatar').textContent = (user.first_name || 'کاربر').charAt(0).toUpperCase();
                document.getElementById('profileName').textContent = user.first_name || 'کاربر';
                document.getElementById('profileId').textContent = user.username ? `@${user.username}` : 'کاربر';
            }

            // Stories
            renderStories();

            // Events
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('searchClear').addEventListener('click', clearSearch);

            document.querySelectorAll('.category-tab').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.cat;
                    filterPosts();
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                });
            });

            // Dock
            document.querySelectorAll('.dock-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    document.querySelectorAll('.dock-btn').forEach(b => {
                        b.classList.remove('active');
                        b.querySelector('i').className = b.querySelector('i').className.replace('ph-fill', 'ph');
                    });
                    this.classList.add('active');
                    const icon = this.querySelector('i');
                    icon.className = icon.className.replace('ph', 'ph-fill');

                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    document.getElementById(`tab-${tab}`).classList.add('active');

                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                });
            });

            // Chat
            document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
            document.getElementById('chatInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendChatMessage();
            });

            // Publish
            document.getElementById('publishBtn').addEventListener('click', handlePublish);
            document.getElementById('updateBtn').addEventListener('click', handleUpdate);
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('settingsToggle').addEventListener('click', toggleSettings);
            document.getElementById('supportBtn').addEventListener('click', openSupport);

            // Upload
            document.getElementById('uploadBtn').addEventListener('click', function() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            document.getElementById('previewImg').src = ev.target.result;
                            document.getElementById('uploadPreview').classList.add('show');
                            document.getElementById('postImage').value = ev.target.result;
                            document.getElementById('postImage').style.display = 'block';
                        };
                        reader.readAsDataURL(file);
                    }
                };
                input.click();
            });

            document.getElementById('removeImg').addEventListener('click', function() {
                document.getElementById('uploadPreview').classList.remove('show');
                document.getElementById('postImage').value = '';
                document.getElementById('postImage').style.display = 'none';
            });

            loadPosts();
            loadChatMessages();
            setInterval(loadChatMessages, 8000);
        });

        // ============================================================
        //  Stories
        // ============================================================
        function renderStories() {
            const container = document.getElementById('storiesContainer');
            const users = [
                { name: 'فیلم‌ها', emoji: '🎬' },
                { name: 'جدید', emoji: '🔥' },
                { name: 'پربازدید', emoji: '⭐' }
            ];
            container.innerHTML = users.map(u => `
                <div class="story-item" onclick="filterByStory('${u.name}')">
                    <div class="story-avatar"><div class="inner">${u.emoji}</div></div>
                    <span class="story-name">${u.name}</span>
                </div>
            `).join('');
        }

        function filterByStory(name) {
            if (name === 'فیلم‌ها') {
                currentCategory = 'all';
                document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-cat="all"]').classList.add('active');
                filterPosts();
            }
        }

        // ============================================================
        //  پست‌ها
        // ============================================================
        async function loadPosts() {
            try {
                const res = await fetch(`${API_URL}/posts`);
                if (res.ok) {
                    allPosts = await res.json();
                    updateStats();
                } else allPosts = [];
                filterPosts();
            } catch { allPosts = []; filterPosts(); }
        }

        function updateStats() {
            const totalLikes = allPosts.reduce((sum, p) => sum + (p.likes || 0), 0);
            const totalComments = allPosts.reduce((sum, p) => sum + (p.comments || 0), 0);
            document.getElementById('statPosts').textContent = allPosts.length;
            document.getElementById('statLikes').textContent = totalLikes;
            document.getElementById('statComments').textContent = totalComments;
            document.getElementById('profilePosts').textContent = allPosts.length;
            document.getElementById('profileLikes').textContent = totalLikes;
        }

        function filterPosts() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allPosts;
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => (p.category || '').toLowerCase().includes(currentCategory));
            }
            if (search) {
                filtered = filtered.filter(p => (p.title || '').toLowerCase().includes(search) || (p.desc || '').toLowerCase().includes(search));
            }
            renderPosts(filtered);
        }

        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');
            const isAdmin = currentUser && currentUser.id === ADMIN_ID;

            if (!posts || posts.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="ph-fill ph-film-slate"></i><p>فیلمی پیدا نشد</p></div>`;
                return;
            }

            container.innerHTML = posts.map((post, i) => `
                <div class="post-card" style="animation-delay: ${i * 0.03}s;" id="post-${post.id}">
                    <div class="post-image" onclick="window.open('${post.image || ''}', '_blank')">
                        ${post.image ? `<img src="${post.image}" alt="پوستر" loading="lazy">` :
                        `<div class="placeholder"><i class="ph-fill ph-image"></i></div>`}
                    </div>
                    <div class="post-body">
                        <div class="post-header">
                            <div class="post-title"><i class="ph-fill ph-film-script"></i> ${post.title || 'بدون عنوان'}</div>
                            <div class="post-date">${post.date || '---'}</div>
                        </div>
                        <div class="post-desc">${post.desc || ''}</div>
                        <div class="post-footer">
                            ${post.link ? `<a href="${post.link}" class="post-link" target="_blank"><i class="ph ph-download-simple"></i> دانلود</a>` :
                            `<span style="font-size:12px;color:var(--text-muted);"><i class="ph ph-link-simple"></i> لینکی نیست</span>`}
                            <div class="post-stats">
                                <span class="stat ${post.user_liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                    <i class="${post.user_liked ? 'ph-fill' : 'ph'} ph-heart"></i> <span class="num" id="likes-${post.id}">${post.likes || 0}</span>
                                </span>
                                <span class="stat" onclick="toggleComments(${post.id})">
                                    <i class="ph-fill ph-chat-circle"></i> <span class="num" id="comments-${post.id}">${post.comments || 0}</span>
                                </span>
                            </div>
                        </div>
                    </div>
                    ${isAdmin ? `
                        <div class="post-admin-controls">
                            <button class="btn-edit" onclick="startEdit(${post.id})"><i class="ph ph-pencil-simple"></i> ویرایش</button>
                            <button class="btn-delete" onclick="deletePost(${post.id})"><i class="ph ph-trash"></i> حذف</button>
                        </div>
                    ` : ''}
                    <div class="comments-section" id="comments-${post.id}-section">
                        <div id="comments-list-${post.id}"></div>
                        <div class="comment-input-wrap">
                            <input class="comment-input" id="comment-input-${post.id}" placeholder="نظر...">
                            <button class="comment-send" onclick="sendComment(${post.id})"><i class="ph-fill ph-paper-plane-right"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        //  لایک
        // ============================================================
        async function toggleLike(postId) {
            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            if (!user) return;

            try {
                const res = await fetch(`${API_URL}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ post_id: postId, user_id: user.id })
                });

                if (res.ok) {
                    const result = await res.json();
                    const likesSpan = document.getElementById(`likes-${postId}`);
                    if (likesSpan) likesSpan.textContent = result.likes;
                    const stat = document.querySelector(`#post-${postId} .post-stats .stat:first-child`);
                    if (stat) {
                        stat.classList.toggle('liked');
                        const icon = stat.querySelector('i');
                        icon.className = stat.classList.contains('liked') ? 'ph-fill ph-heart' : 'ph ph-heart';
                    }
                    updateStats();
                    if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                }
            } catch (error) { console.error('خطا در لایک:', error); }
        }

        // ============================================================
        //  کامنت
        // ============================================================
        async function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}-section`);
            if (section.classList.contains('open')) { section.classList.remove('open'); return; }
            section.classList.add('open');
            await loadComments(postId);
        }

        async function loadComments(postId) {
            try {
                const res = await fetch(`${API_URL}/comments/${postId}`);
                if (res.ok) {
                    const comments = await res.json();
                    const container = document.getElementById(`comments-list-${postId}`);
                    if (!comments.length) {
                        container.innerHTML = `<p style="color:var(--text-muted);font-size:12px;padding:8px 0;">هنوز نظری نیست</p>`;
                    } else {
                        container.innerHTML = comments.map(c => `
                            <div class="comment-item">
                                <div class="comment-avatar">${c.username ? c.username.charAt(0).toUpperCase() : '👤'}</div>
                                <div class="comment-body">
                                    <div class="comment-name">${c.username || 'کاربر'}</div>
                                    <div class="comment-text">${c.text}</div>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) { console.error('خطا در دریافت کامنت:', error); }
        }

        async function sendComment(postId) {
            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            if (!user) return;
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (!text) return;

            try {
                const res = await fetch(`${API_URL}/comment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ post_id: postId, user_id: user.id, username: user.first_name || 'کاربر', text })
                });

                if (res.ok) {
                    input.value = '';
                    const commentsSpan = document.getElementById(`comments-${postId}`);
                    if (commentsSpan) commentsSpan.textContent = (parseInt(commentsSpan.textContent) || 0) + 1;
                    await loadComments(postId);
                    updateStats();
                    if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            } catch (error) { console.error('خطا در ارسال کامنت:', error); }
        }

        // ============================================================
        //  چت
        // ============================================================
        async function loadChatMessages() {
            try {
                const res = await fetch(`${API_URL}/chat`);
                if (res.ok) {
                    const messages = await res.json();
                    const container = document.getElementById('chatMessages');
                    if (!messages.length) {
                        container.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:20px;"><i class="ph-fill ph-chat-dots" style="font-size:28px;display:block;margin-bottom:8px;"></i>اولین پیام رو بفرست!</div>`;
                    } else {
                        container.innerHTML = messages.map(m => `
                            <div class="chat-msg ${m.user_id === currentUser?.id ? 'self' : 'other'}" id="msg-${m.id}">
                                ${m.reply_to ? `<div class="reply">${m.reply_text || 'پاسخ به پیام'}</div>` : ''}
                                <div class="sender">${m.username || 'کاربر'}</div>
                                <div class="text">${m.text}</div>
                                <span class="time">${m.date ? m.date.slice(0, 16).replace('T', ' ') : ''}</span>
                                <div class="actions">
                                    <button onclick="copyMessage('${m.text.replace(/'/g, "\\'")}')"><i class="ph ph-copy"></i></button>
                                    <button onclick="replyToMessage(${m.id}, '${m.text.replace(/'/g, "\\'")}')"><i class="ph ph-arrow-bend-up-left"></i></button>
                                    ${m.user_id === currentUser?.id ? `<button class="delete-btn" onclick="deleteMessage(${m.id})"><i class="ph ph-trash"></i></button>` : ''}
                                </div>
                            </div>
                        `).join('');
                        container.scrollTop = container.scrollHeight;
                    }
                    document.getElementById('chatUsers').textContent = `${messages.length} پیام`;
                }
            } catch (error) { console.error('خطا در دریافت چت:', error); }
        }

        async function sendChatMessage() {
            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            if (!user) return;
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        username: user.first_name || 'کاربر',
                        text: text,
                        reply_to: replyTo ? replyTo.id : null,
                        reply_text: replyTo ? replyTo.text : null
                    })
                });

                if (res.ok) {
                    input.value = '';
                    replyTo = null;
                    document.getElementById('chatInput').placeholder = 'پیام...';
                    await loadChatMessages();
                    if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            } catch (error) { console.error('خطا در ارسال پیام:', error); }
        }

        // ============================================================
        //  ابزارهای چت
        // ============================================================
        function copyMessage(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
                if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
            }
        }

        function replyToMessage(id, text) {
            replyTo = { id, text };
            document.getElementById('chatInput').placeholder = `پاسخ به: ${text.slice(0, 30)}...`;
            document.getElementById('chatInput').focus();
            if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }

        async function deleteMessage(id) {
            if (!confirm('حذف پیام؟')) return;
            try {
                const res = await fetch(`${API_URL}/chat/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    await loadChatMessages();
                    if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }
            } catch (error) { console.error('خطا در حذف پیام:', error); }
        }

        // ============================================================
        //  انتشار، ویرایش، حذف
        // ============================================================
        async function handlePublish() {
            const status = document.getElementById('adminStatus');
            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            status.textContent = '⏳ در حال انتشار...';
            status.className = 'admin-status';

            const newPost = {
                image: document.getElementById('postImage').value.trim(),
                title: document.getElementById('postTitle').value.trim(),
                category: document.getElementById('postCategory').value.trim(),
                desc: document.getElementById('postDesc').value.trim(),
                link: document.getElementById('postLink').value.trim(),
                user_id: currentUser ? currentUser.id : 0
            };

            if (!newPost.title) {
                status.textContent = '⚠️ عنوان رو وارد کن!';
                status.className = 'admin-status error';
                btn.disabled = false;
                return;
            }

            try {
                const res = await fetch(`${API_URL}/posts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newPost)
                });

                if (res.ok) {
                    status.textContent = '✅ منتشر شد!';
                    status.className = 'admin-status success';
                    clearForm();
                    loadPosts();
                    if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                } else {
                    throw new Error('خطا');
                }
            } catch (error) {
                status.textContent = `❌ ${error.message}`;
                status.className = 'admin-status error';
            }
            btn.disabled = false;
        }

        function startEdit(id) {
            const post = allPosts.find(p => p.id === id);
            if (!post) return;
            editingPostId = id;

            document.getElementById('postImage').value = post.image || '';
            document.getElementById('postTitle').value = post.title || '';
            document.getElementById('postCategory').value = post.category || '';
            document.getElementById('postDesc').value = post.desc || '';
            document.getElementById('postLink').value = post.link || '';

            if (post.image) {
                document.getElementById('previewImg').src = post.image;
                document.getElementById('uploadPreview').classList.add('show');
                document.getElementById('postImage').style.display = 'block';
            }

            document.getElementById('publishBtn').classList.add('hidden');
            document.getElementById('updateBtn').classList.remove('hidden');
            document.getElementById('adminStatus').textContent = '✎ ویرایش';
            document.getElementById('adminStatus').className = 'admin-status';
            document.getElementById('contentScroll').scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function handleUpdate() {
            if (!editingPostId) return;
            const status = document.getElementById('adminStatus');
            const btn = document.getElementById('updateBtn');
            btn.disabled = true;

            const updated = {
                id: editingPostId,
                image: document.getElementById('postImage').value.trim(),
                title: document.getElementById('postTitle').value.trim(),
                category: document.getElementById('postCategory').value.trim(),
                desc: document.getElementById('postDesc').value.trim(),
                link: document.getElementById('postLink').value.trim()
            };

            if (!updated.title) {
                status.textContent = '⚠️ عنوان رو وارد کن!';
                status.className = 'admin-status error';
                btn.disabled = false;
                return;
            }

            try {
                const res = await fetch(`${API_URL}/posts/${editingPostId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updated)
                });

                if (res.ok) {
                    status.textContent = '✅ بروزرسانی شد!';
                    status.className = 'admin-status success';
                    clearForm();
                    document.getElementById('publishBtn').classList.remove('hidden');
                    document.getElementById('updateBtn').classList.add('hidden');
                    editingPostId = null;
                    loadPosts();
                    if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                } else {
                    throw new Error('خطا');
                }
            } catch {
                status.textContent = '❌ خطا';
                status.className = 'admin-status error';
            }
            btn.disabled = false;
        }

        async function deletePost(id) {
            if (!confirm('حذف کنم؟')) return;
            try {
                const res = await fetch(`${API_URL}/posts/${id}`, { method: 'DELETE' });
                if (res.ok) { loadPosts(); if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success'); }
            } catch { alert('خطا در حذف'); }
        }

        // ============================================================
        //  تنظیمات و پشتیبانی
        // ============================================================
        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('show');
            if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }

        function openSupport() {
            const user = window.Telegram.WebApp.initDataUnsafe?.user;
            if (!user) return;
            const msg = prompt('پیام خود را به پشتیبانی بنویسید:');
            if (msg) {
                fetch(`${API_URL}/support`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        username: user.first_name || 'کاربر',
                        text: msg
                    })
                }).then(() => {
                    alert('✅ پیام شما به پشتیبانی ارسال شد');
                    if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                }).catch(() => alert('❌ خطا در ارسال پیام'));
            }
        }

        // ============================================================
        //  توابع کمکی
        // ============================================================
        function handleSearch() {
            const input = document.getElementById('searchInput');
            document.getElementById('searchClear').style.display = input.value.length ? 'block' : 'none';
            filterPosts();
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchClear').style.display = 'none';
            filterPosts();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
            document.getElementById('themeStatus').textContent = current === 'light' ? 'تاریک' : 'روشن';
            if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }

        function clearForm() {
            ['postImage', 'postTitle', 'postCategory', 'postDesc', 'postLink'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('uploadPreview').classList.remove('show');
            document.getElementById('postImage').style.display = 'none';
            document.getElementById('adminStatus').textContent = '';
            document.getElementById('adminStatus').className = 'admin-status';
        }

        // Close settings on overlay click
        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('show');
        });
    </script>
</body>
</html>
